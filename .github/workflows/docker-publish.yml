name: Build, Test, and Publish Docker Image

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:

      # ── Step 1: Check out source code ──────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Step 2: Set up Python on the runner ────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # ── Step 3: Install uv on the runner ───────────────────────
      - name: Install uv
        run: pip install uv

      # ── Step 4: Install project dependencies ───────────────────
      - name: Install dependencies
        run: uv sync --no-dev –no-install-project

      # ── Step 5: Download MovieLens dataset ─────────────────────
      - name: Download MovieLens 100k dataset
        run: uv run python scripts/download_data.py

      # ── Step 6: Train KNN model and generate artifacts ─────────
      - name: Train KNN model
        run: uv run python scripts/train_knn.py

      # ── Step 7: Enable Docker Buildx ───────────────────────────
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Step 8: Log in to GitHub Container Registry ────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Step 9: Compute image tags and OCI labels ──────────────
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=ref,event=branch
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # ── Step 10: Build the image (load into runner for testing) ─
      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          load: true
          tags: movie-reco-api:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # ── Step 11: Start the container and smoke-test the API ─────
      - name: Start container and run smoke test
        run: |
          docker run -d -p 8000:8000 --name reco_test movie-reco-api:test
          echo 'Waiting for API to be ready...'
          sleep 10
          curl --fail --retry 5 --retry-delay 3 http://localhost:8000/health
          curl --fail -X POST http://localhost:8000/recommend \
            -H 'Content-Type: application/json' \
            -d '{"movie_title": "Toy Story (1995)", "k": 3}'

      # ── Step 12: Stop the test container ───────────────────────
      - name: Stop test container
        if: always()
        run: docker rm -f reco_test

      # ── Step 13: Push verified image to GHCR ───────────────────
      - name: Push Docker image to GHCR
        uses: docker/build-push-action@v5
        with:
          context: .
          target: runtime
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
